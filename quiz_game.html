<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首都クイズゲーム</title>
  <style>
    :root {
      --color-bg: #eef3f7;
      --color-card: #ffffff;
      --color-text: #17212b;
      --color-muted: #667085;
      --color-border: #d8e0e8;
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-success: #0f8a5f;
      --color-error: #c2410c;
      --color-surface: #f7fafc;
      --shadow-card: 0 18px 50px rgba(23, 33, 43, 0.13);
      --radius-card: 8px;
      --radius-control: 6px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.12), transparent 34%),
        var(--color-bg);
      color: var(--color-text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    .quiz-card {
      width: min(100%, 560px);
      padding: 28px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      background: var(--color-card);
      box-shadow: var(--shadow-card);
    }

    .quiz-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      color: var(--color-muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .score {
      color: var(--color-primary);
      white-space: nowrap;
    }

    .question-area {
      min-height: 132px;
      display: grid;
      place-items: center;
      padding: 24px;
      margin-bottom: 18px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
      background: var(--color-surface);
      text-align: center;
    }

    .question-text {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 2rem);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .answer-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    input[type="text"] {
      width: 100%;
      min-width: 0;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
      background: #ffffff;
      color: var(--color-text);
      font: inherit;
    }

    input[type="text"]:focus {
      border-color: var(--color-primary);
      outline: 3px solid rgba(37, 99, 235, 0.16);
    }

    input[type="text"]:disabled {
      background: #eef2f6;
      color: var(--color-muted);
      cursor: not-allowed;
    }

    .button {
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: var(--radius-control);
      background: var(--color-primary);
      color: #ffffff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .button:hover:not(:disabled) {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
    }

    .button:disabled {
      background: #a8b4c2;
      cursor: not-allowed;
      transform: none;
    }

    .button.secondary {
      background: #17212b;
    }

    .button.secondary:hover:not(:disabled) {
      background: #2b3642;
    }

    .feedback {
      min-height: 34px;
      margin: 0 0 18px;
      color: var(--color-muted);
      font-weight: 700;
      text-align: center;
    }

    .feedback.correct {
      color: var(--color-success);
    }

    .feedback.incorrect {
      color: var(--color-error);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 420px) {
      body {
        padding: 16px;
      }

      .quiz-card {
        padding: 20px;
      }

      .quiz-status {
        gap: 10px;
        font-size: 0.9rem;
      }

      .question-area {
        min-height: 116px;
        padding: 18px;
      }

      .button {
        padding: 0 14px;
      }
    }
  </style>
</head>
<body>
  <main class="quiz-card" aria-label="首都クイズゲーム">
    <div class="quiz-status">
      <span id="questionCounter">問題 0 / 3</span>
      <span id="scoreDisplay" class="score">スコア: 0</span>
    </div>

    <section class="question-area" aria-live="polite">
      <p id="questionText" class="question-text">スタートボタンを押してください</p>
    </section>

    <div class="answer-row">
      <input id="answerInput" type="text" autocomplete="off" placeholder="答えを入力" disabled>
      <button id="submitButton" class="button" type="button" disabled>回答</button>
    </div>

    <p id="feedback" class="feedback" aria-live="polite"></p>

    <div class="actions">
      <button id="startButton" class="button" type="button">スタート</button>
      <button id="retryButton" class="button secondary hidden" type="button">もう一度</button>
    </div>
  </main>

  <script>
    const questions = [
      { question: "日本の首都は？", answer: "東京" },
      { question: "フランスの首都は？", answer: "パリ" },
      { question: "アメリカの首都は？", answer: "ワシントン" }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let isPlaying = false;

    const questionCounter = document.getElementById("questionCounter");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const questionText = document.getElementById("questionText");
    const answerInput = document.getElementById("answerInput");
    const submitButton = document.getElementById("submitButton");
    const feedback = document.getElementById("feedback");
    const startButton = document.getElementById("startButton");
    const retryButton = document.getElementById("retryButton");

    function updateStatus() {
      const visibleQuestionNumber = Math.min(currentQuestionIndex + 1, questions.length);
      questionCounter.textContent = `問題 ${isPlaying ? visibleQuestionNumber : 0} / ${questions.length}`;
      scoreDisplay.textContent = `スコア: ${score}`;
    }

    function startGame() {
      currentQuestionIndex = 0;
      score = 0;
      isPlaying = true;
      feedback.textContent = "";
      feedback.className = "feedback";
      answerInput.disabled = false;
      submitButton.disabled = false;
      startButton.classList.add("hidden");
      retryButton.classList.add("hidden");
      showQuestion();
    }

    function showQuestion() {
      updateStatus();
      questionText.textContent = questions[currentQuestionIndex].question;
      answerInput.value = "";
      answerInput.focus();
    }

    function submitAnswer() {
      if (!isPlaying) {
        return;
      }

      const currentQuestion = questions[currentQuestionIndex];
      const userAnswer = answerInput.value.trim();
      const isCorrect = userAnswer === currentQuestion.answer;

      if (isCorrect) {
        score += 1;
        feedback.textContent = "正解です！";
        feedback.className = "feedback correct";
      } else {
        feedback.textContent = `不正解です。正解は「${currentQuestion.answer}」です。`;
        feedback.className = "feedback incorrect";
      }

      currentQuestionIndex += 1;
      updateStatus();

      if (currentQuestionIndex >= questions.length) {
        finishGame();
        return;
      }

      showQuestion();
    }

    function finishGame() {
      isPlaying = false;
      questionCounter.textContent = `問題 ${questions.length} / ${questions.length}`;
      scoreDisplay.textContent = `スコア: ${score}`;
      questionText.textContent = `全問終了！最終スコアは ${score} / ${questions.length} です。`;
      answerInput.value = "";
      answerInput.disabled = true;
      submitButton.disabled = true;
      retryButton.classList.remove("hidden");
    }

    function resetGame() {
      currentQuestionIndex = 0;
      score = 0;
      isPlaying = false;
      questionCounter.textContent = `問題 0 / ${questions.length}`;
      scoreDisplay.textContent = "スコア: 0";
      questionText.textContent = "スタートボタンを押してください";
      answerInput.value = "";
      answerInput.disabled = true;
      submitButton.disabled = true;
      feedback.textContent = "";
      feedback.className = "feedback";
      startButton.classList.remove("hidden");
      retryButton.classList.add("hidden");
    }

    startButton.addEventListener("click", startGame);
    submitButton.addEventListener("click", submitAnswer);
    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        submitAnswer();
      }
    });
    retryButton.addEventListener("click", () => {
      resetGame();
      startGame();
    });

    resetGame();
  </script>
</body>
</html>

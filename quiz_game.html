<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消滅した国家の首都クイズ</title>
  <style>
    :root {
      --color-bg: #0d0d10;
      --color-card: #17171c;
      --color-text: #f7f2ef;
      --color-muted: #b8adab;
      --color-border: #39323a;
      --color-primary: #d7263d;
      --color-primary-hover: #a80f24;
      --color-success: #42d392;
      --color-error: #ff8f9d;
      --color-surface: #111115;
      --color-input: #fff8f6;
      --shadow-card: 0 18px 52px rgba(0, 0, 0, 0.42);
      --radius-card: 8px;
      --radius-control: 6px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(145deg, rgba(215, 38, 61, 0.24), transparent 36%),
        linear-gradient(315deg, rgba(168, 15, 36, 0.22), transparent 32%),
        var(--color-bg);
      color: var(--color-text);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      line-height: 1.6;
    }

    .quiz-card {
      width: min(100%, 560px);
      padding: 28px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      background: var(--color-card);
      box-shadow: var(--shadow-card);
    }

    .quiz-title {
      margin: 0 0 18px;
      font-size: clamp(1.45rem, 4vw, 2rem);
      line-height: 1.3;
      letter-spacing: 0;
    }

    .quiz-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      color: var(--color-muted);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .score {
      color: var(--color-primary);
      white-space: nowrap;
    }

    .question-area {
      min-height: 138px;
      display: grid;
      place-items: center;
      padding: 24px;
      margin-bottom: 18px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
      background: var(--color-surface);
      text-align: center;
    }

    .question-text {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 2rem);
      font-weight: 900;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .answer-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    input[type="text"] {
      width: 100%;
      min-width: 0;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
      background: var(--color-input);
      color: #181417;
      font: inherit;
      font-weight: 800;
    }

    input[type="text"]:focus {
      border-color: var(--color-primary);
      outline: 3px solid rgba(215, 38, 61, 0.3);
    }

    input[type="text"]:disabled {
      background: #9d9696;
      color: #4e4749;
      cursor: not-allowed;
    }

    .button {
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: var(--radius-control);
      background: var(--color-primary);
      color: #fff8f6;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .button:hover:not(:disabled) {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
    }

    .button:disabled {
      background: #595158;
      color: #c8bfc0;
      cursor: not-allowed;
      transform: none;
    }

    .button.secondary {
      border: 1px solid var(--color-border);
      background: #242129;
    }

    .button.secondary:hover:not(:disabled) {
      background: #30252c;
    }

    .feedback {
      min-height: 34px;
      margin: 0 0 18px;
      color: var(--color-muted);
      font-weight: 800;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .feedback.correct {
      color: var(--color-success);
    }

    .feedback.incorrect {
      color: var(--color-error);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 420px) {
      body {
        padding: 16px;
      }

      .quiz-card {
        padding: 20px;
      }

      .quiz-status {
        gap: 10px;
        font-size: 0.9rem;
      }

      .question-area {
        min-height: 122px;
        padding: 18px;
      }

      .answer-row {
        flex-direction: column;
      }

      .button {
        width: 100%;
        padding: 0 14px;
      }
    }
  </style>
</head>
<body>
  <main class="quiz-card" aria-label="消滅した国家の首都クイズ">
    <h1 class="quiz-title">消滅した国家の首都クイズ</h1>

    <div class="quiz-status">
      <span id="questionCounter">問題 0 / 10</span>
      <span id="scoreDisplay" class="score">スコア: 0</span>
    </div>

    <section class="question-area" aria-live="polite">
      <p id="questionText" class="question-text">スタートボタンを押してください</p>
    </section>

    <div class="answer-row">
      <input id="answerInput" type="text" autocomplete="off" placeholder="答えを入力" disabled>
      <button id="submitButton" class="button" type="button" disabled>回答</button>
    </div>

    <p id="feedback" class="feedback" aria-live="polite"></p>

    <div class="actions">
      <button id="startButton" class="button" type="button">スタート</button>
      <button id="retryButton" class="button secondary hidden" type="button">もう一度</button>
    </div>
  </main>

  <script>
    const questions = [
      { question: "ソビエト連邦の首都は？", answer: "モスクワ" },
      { question: "ハワイ王国の首都は？", answer: "ホノルル" },
      { question: "西ドイツの首都は？", answer: "ボン" },
      { question: "琉球王国の首都は？", answer: "首里" },
      { question: "ロシア帝国の首都は？", answer: "サンクトペテルブルク" },
      { question: "バイエルン王国の首都は？", answer: "ミュンヘン" },
      { question: "ティムール帝国の首都は？", answer: "サマルカンド" },
      { question: "インカ帝国の首都は？", answer: "クスコ" },
      { question: "ヴィシーフランスの首都は", answer: "ヴィシー" },
      { question: "アメリカ連合国の首都は？", answer: "リッチモンド" }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let isPlaying = false;

    const questionCounter = document.getElementById("questionCounter");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const questionText = document.getElementById("questionText");
    const answerInput = document.getElementById("answerInput");
    const submitButton = document.getElementById("submitButton");
    const feedback = document.getElementById("feedback");
    const startButton = document.getElementById("startButton");
    const retryButton = document.getElementById("retryButton");

    function updateStatus() {
      const visibleQuestionNumber = isPlaying ? Math.min(currentQuestionIndex + 1, questions.length) : 0;
      questionCounter.textContent = `問題 ${visibleQuestionNumber} / ${questions.length}`;
      scoreDisplay.textContent = `スコア: ${score}`;
    }

    function startGame() {
      currentQuestionIndex = 0;
      score = 0;
      isPlaying = true;
      feedback.textContent = "";
      feedback.className = "feedback";
      answerInput.disabled = false;
      submitButton.disabled = false;
      startButton.classList.add("hidden");
      retryButton.classList.add("hidden");
      showQuestion();
    }

    function showQuestion() {
      if (!isPlaying || currentQuestionIndex >= questions.length) {
        return;
      }

      updateStatus();
      questionText.textContent = questions[currentQuestionIndex].question;
      answerInput.value = "";
      answerInput.disabled = false;
      submitButton.disabled = false;
      answerInput.focus();
    }

    function submitAnswer() {
      if (!isPlaying) {
        return;
      }

      const currentQuestion = questions[currentQuestionIndex];
      const userAnswer = answerInput.value.trim();
      const correctAnswer = currentQuestion.answer.trim();
      const isCorrect = userAnswer === correctAnswer;

      answerInput.disabled = true;
      submitButton.disabled = true;

      if (isCorrect) {
        score += 1;
        feedback.textContent = "正解です。";
        feedback.className = "feedback correct";
      } else {
        feedback.textContent = `不正解です。正解は「${currentQuestion.answer}」です。`;
        feedback.className = "feedback incorrect";
      }

      currentQuestionIndex += 1;
      updateStatus();

      if (currentQuestionIndex >= questions.length) {
        finishGame();
        return;
      }

      window.setTimeout(() => {
        feedback.textContent = "";
        feedback.className = "feedback";
        showQuestion();
      }, 900);
    }

    function finishGame() {
      isPlaying = false;
      questionCounter.textContent = `問題 ${questions.length} / ${questions.length}`;
      scoreDisplay.textContent = `スコア: ${score}`;
      questionText.textContent = `全問終了！最終スコアは ${score} / ${questions.length} です。`;
      answerInput.value = "";
      answerInput.disabled = true;
      submitButton.disabled = true;
      retryButton.classList.remove("hidden");
    }

    function resetGame() {
      currentQuestionIndex = 0;
      score = 0;
      isPlaying = false;
      questionCounter.textContent = `問題 0 / ${questions.length}`;
      scoreDisplay.textContent = "スコア: 0";
      questionText.textContent = "スタートボタンを押してください";
      answerInput.value = "";
      answerInput.disabled = true;
      submitButton.disabled = true;
      feedback.textContent = "";
      feedback.className = "feedback";
      startButton.classList.remove("hidden");
      retryButton.classList.add("hidden");
    }

    startButton.addEventListener("click", startGame);
    submitButton.addEventListener("click", submitAnswer);
    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        submitAnswer();
      }
    });
    retryButton.addEventListener("click", () => {
      resetGame();
      startGame();
    });

    resetGame();
  </script>
</body>
</html>
